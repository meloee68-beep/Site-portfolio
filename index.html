<!DOCTYPE html>

<head>

    <title>Portfolio - LP Robotique & IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABLES & THÈME (Style moderne & épuré) --- */
        :root {
            --bg-color: #f4f7f6;
            --primary-color: #6c5ce7; 
            --secondary-color: #00d2ff; 
            --text-color: #2d3436;
            --text-muted: #636e72;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- FORMES DE FOND ANIMÉES --- */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            animation: float 18s infinite ease-in-out alternate;
        }
        .shape-1 { width: 450px; height: 450px; background: var(--primary-color); top: -100px; left: -100px; }
        .shape-2 { width: 550px; height: 550px; background: var(--secondary-color); bottom: -150px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(60px, 40px) rotate(10deg); }
        }

        /* --- ANIMATIONS GLOBALES --- */
        .fade-in-global { animation: fadeInGlobal 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .fade-out-global { animation: fadeOutGlobal 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInGlobal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOutGlobal { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.98); } }

        /* --- PAGE D'ACCUEIL --- */
        #page-accueil {
            height: 100vh;
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            padding: 0 8%;
            gap: 50px;
        }

        .header-accueil {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            text-align: left;
            gap: 15px;
            max-width: 450px;
        }

        .logo-container {
            background-color: #ffffff;          
            padding: 8px 12px;                  
            border-radius: 16px;                
            display: inline-block;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
        }

        .header-logo { height: 65px; display: block; background-color: #ffffff; }
        .header-etablissement { font-size: 0.8rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
        .header-accueil h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), #3b22a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.15;
        }

        .right-container {
            flex: 1.4;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 650px;
            width: 100%;
        }

        .ue-grid-accueil {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }

        .ue-box-accueil {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ue-box-accueil:hover {
            background: #ffffff;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.12);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .ue-box-accueil .icon { font-size: 2rem; }
        .ue-box-accueil h3 { font-size: 1.4rem; font-weight: 800; color: var(--text-color); }
        .ue-box-accueil p { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }

        /* --- PAGE TABLEAU DE BORD --- */
        #page-dashboard { 
            display: none; 
            height: 100vh; 
            flex-direction: row;
        }
        
        .sidebar { 
            width: 280px; 
            border-right: 1px solid var(--card-border); 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
        }

        .btn-menu-principal {
            padding: 12px;
            margin-bottom: 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            background: var(--text-color);
            color: white;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-menu-principal:hover { background: #000; transform: translateX(-3px); }

        .nav-item { 
            padding: 12px 14px; 
            margin-bottom: 8px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem;
            transition: all 0.3s; 
            color: var(--text-muted); 
        }
        .nav-item:hover { background: rgba(255,255,255,0.6); color: var(--primary-color); }
        .nav-item.active { background: var(--primary-color); color: white; box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2); }

        .main-view { 
            flex: 1; 
            padding: 40px; 
            overflow-y: auto; 
            z-index: 5;
        }

        .content-box { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.03); 
        }

        .ue-title-page { font-size: 2rem; font-weight: 800; color: var(--text-color); margin-bottom: 8px; }
        .ue-subtitle-page { font-size: 1rem; color: var(--text-muted); margin-bottom: 30px; font-weight: 500; }

        /* --- GRANDS TITRES DE CATEGORIES --- */
        .section-category-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-top: 30px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid rgba(108, 92, 231, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-category-title:first-child {
            margin-top: 0;
        }

        /* --- CONTENEUR DES SÉQUENCES DE MATIÈRES --- */
        .horizontal-accordion-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .horizontal-case {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .horizontal-case[open] {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .horizontal-case summary {
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            color: var(--text-color);
        }
        .horizontal-case summary::-webkit-details-marker { display: none; }

        .case-header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .case-header-title .case-number {
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .horizontal-case summary:hover { color: var(--primary-color); }
        .horizontal-case summary:hover .case-number { background: rgba(108, 92, 231, 0.1); color: var(--primary-color); }

        .horizontal-case .arrow {
            font-size: 0.8rem;
            transition: transform 0.3s;
            color: var(--text-muted);
        }
        .horizontal-case[open] .arrow {
            transform: rotate(180deg);
            color: var(--primary-color);
        }

        .case-content {
            padding: 0 25px 25px 25px;
            border-top: 1px solid rgba(0,0,0,0.02);
            background: linear-gradient(to bottom, #fafbfc, #ffffff);
        }

        .inner-text-block {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #4a5568;
        }
    </style>
</head>

    <script>
        // Structures de données complètes par UE
        const structureUE1 = [
            /* --- COMPOSANTES ESSENTIELLES --- */
            { typeTitle: "⚙️ Composantes Essentielles", id: "CE1.01", name: "En respectant les normes industrielles.", desc: "Tout au long de mon parcours, j'ai vite compris que dans l'industrie, on ne fait pas ce qu'on veut : le respect des normes et des réglementations, c'est le fil conducteur de tout notre boulot.<p><br>Dès nos premiers cours théoriques et nos TP en automatisme, on nous a bien fait comprendre que ces standards étaient indispensables. En bossant en salle de TP sur des maquettes pédagogiques inspirées de vraies lignes de production et de vraies machines, j'ai été directement confrontée aux exigences industrielles. C'est là que j'ai pris l'habitude de suivre un cahier des charges à la lettre, surtout quand ça touche à la sécurité des installations. Pour manipuler le matériel en atelier, j'ai d'ailleurs dû signer des chartes de bonne conduite sur l'utilisation des robots. Ça m'a vraiment fait prendre conscience des responsabilités et des règles strictes à respecter avant même de charger un programme ou de toucher à une machine.<p><br> Aujourd'hui, quand je démarre une SAÉ, mon premier réflexe est de me plonger dans le cahier des charges pour repérer toutes les contraintes réglementaires à respecter. Au fil des projets, c'est devenu une habitude : je sais interpréter les directives pour être sûre que ce que je conçois en salle de cours ou en TP soit parfaitement conforme. Concrètement, ça veut dire que je fais attention à choisir des composants certifiés, à utiliser les technologies validées par le secteur et à concevoir mes programmes et mes schémas de manière standardisée, pour que n'importe quel autre étudiant ou technicien puisse s'y retrouver."},
            { id: "CE1.02", name: "En s'assurant de la réutilisation des parties de code ou de projets.", desc: "Pour développer la compétence CE1.02, j'ai avancé pas à pas tout au long de l'année, en prenant ce qu'on voyait en cours théorique pour l'appliquer directement dans nos SAÉ. Tout a commencé par les bases : apprendre les syntaxes et la logique de programmation pour avoir des fondations solides.<p><br> Par exemple, pendant les cours d'automatisme, j'ai vite compris l'intérêt de créer un code modulaire et d'apprendre à réutiliser des morceaux de programmes existants au lieu de tout réécrire. J'ai pu tester ça concrètement pendant la SAÉ 1.2 (Développement d'une application d'automatisme), où il a fallu programmer une application en langage Ladder.<p><br> Pour la partie Python, on a bossé pendant les TP du module R1.07 - Fondements de la programmation sur un parcours d'une soixantaine d'exercices répartis sur trois niveaux de difficulté. Comme j'avais déjà quelques petites notions en Python avant d'arriver, ça m'a fait un super entraînement pour consolider mes bases, corriger mes petits défauts et aller vers des techniques de codage un peu plus poussées. C'est le genre d'exercice qui aide à être beaucoup plus à l'aise quand on attaque les projets.<p><br> L'exemple parfait, c'est la SAÉ 1.3-Conception d'une application d'automatisme ou de robotique en réponse à un cahier  où on a dû concevoir un robot croupier. C’était un gros projet qui demandait de faire cohabiter plusieurs programmes différents : le pick and place pour bouger les pièces, la vision par caméra et l'algorithme d'IA. En découpant le code en plusieurs blocs bien indépendants pour chaque fonction, on a gagné un temps fou. C'était beaucoup plus simple à tester séparément, et surtout, ça a rendu l'assemblage final beaucoup moins galère pour faire fonctionner le robot." },
            { id: "CE1.03", name: "En assurant une veille technologique.", desc: "Pour développer la compétence CE1.03, j'ai essayé de garder les yeux grands ouverts sur les nouvelles technologies tout au long de mes cours et de mes projets de SAÉ. Dans nos domaines, rester à la page, c'est indispensable pour proposer des solutions modernes qui tiennent la route face aux vrais besoins des entreprises.<p><br> Un bon exemple, c'est la SAÉ 1.3 où on a fabriqué notre robot croupier. C’était un projet assez lourd avec plusieurs briques technologiques à faire marcher ensemble : le déplacement (pick and place), la vision par caméra et l'algorithme d'IA. Pour éviter que ce soit une usine à gaz, j'ai misé sur un code super modulaire. En créant des blocs de code indépendants pour chaque fonction, on a pu réutiliser des morceaux de programmes facilement et, surtout, l'assemblage final pour faire tourner le robot a été beaucoup plus simple.<p><br> Au deuxième semestre, on est passés à la vitesse supérieure avec des modules très ciblés. En R2.07 - Programmation orientée objet, j'ai découvert la bibliothèque OpenCV pour le traitement d'images. On récupérait les images capturées par les caméras prêtées par l'IUT pour ensuite faire notre reconnaissance de couleurs et de numéros de série par-dessus. En parallèle, le module R2.13 - IA Apprentissage supervisé m'a permis de comprendre comment entraîner des modèles pour rendre les systèmes d'intelligence artificielle plus performants. Enfin, les cours de R2.21 - Robotique et Vision : Approche pratique et R2.22 - Vision industrielle m'ont permis de combiner concrètement les bras articulés et les caméras, en touchant aux outils de pointe de l'imagerie industrielle.<p><br> Toutes ces nouveautés, je les ai directement injectées et concrétisées dans nos projets professionnels à l'IUT. D'abord pour la SAÉ 2.2 - Conception et déploiement d'une solution de robotique, qu'on a menée en partenariat avec l'entreprise Gerflor. L'objectif était de créer une cellule robotisée de toutes pièces. Je me suis occupée de l'étude de faisabilité et de la programmation d'un bras robotique UR10 pour une tâche de palettisation. On a même conçu et fabriqué nos propres pièces sur mesure en utilisant l'impression 3D et la découpe laser.<p><br> Ensuite, pour la SAÉ 2.4 - Conception d'une solution permettant d'améliorer la productivité d'un client, un projet proposé par le groupe SLB, j'ai développé un algorithme capable de repérer et d'identifier des zones de caractères sur des pièces usinées, en intégrant l'outil de deep learning EasyOCR.<p><br> La robotique, la vision et l'IA sont des domaines qui évoluent à toute vitesse. En faisant l'effort de m'intéresser à ces outils récents — que ce soit pour de la reconnaissance de couleurs, de la palettisation ou de la lecture de numéros de série —, j'ai vu mes projets de SAÉ devenir beaucoup plus précis, performants et surtout, proches de la réalité industrielle." },
            { id: "CE1.04", name: "En communication en français et en anglais avec les différents acteurs impliqués.", desc: "Au cours de ma formation, pendant mes projets d’automatisme ou de robotique, j’ai vite réalisé que la technique ne faisait pas tout : pour que ça marche, il faut surtout savoir bien bosser en équipe. C'est là que les modules R1.01 et R2.01 - Anglais et communication m'ont beaucoup aidée. Ils m'ont appris à échanger plus facilement, que ce soit en français ou en anglais, avec toutes les personnes impliquées dans nos projets de groupe ou lors de nos présentations.<p><br> L'anglais m'a vraiment poussée à sortir de ma zone de confort. Entre les notices techniques de robots ou d'automates qui sont presque toujours en anglais, et les petits oraux qu'il fallait préparer pour les cours. Mais ça m'a permis de capter pas mal de vocabulaire technique et d'apprendre à transmettre les informations essentielles pour le boulot.<p><br> Mon niveau en anglais reste pour l'instant limité et constitue l'un de mes points faibles. J'ai parfois du mal à m'exprimer de manière fluide à l'oral et à comprendre des discussion complexe. C'est vraiment quelque chose que je veux améliorer. Je compte continuer à m'entraîner à parler dès que j'en ai l'occasion et continuer à lire des docs en anglais pour me familiariser avec la langue et gagner en confiance." },
            
            /* --- SITUATIONS PROFESSIONNELLES --- */
            { typeTitle: "💼 Situations Professionnelles", id: "SP1.01", name: "Conception d'une application d'automatisme ou de robotique, en réponse à un cahier des charges.", desc: "Dans le cadre de la SAE 13-Conception d'une application d'automatisme ou de robotique en réponse à un cahier des charges, j'ai pu développer mes compétences techniques et gagner en assurance, notamment en apprenant à manipuler la découpeuse laser.<p> <br>Sur le plan du développement, ce projet m'a permis de perfectionner ma maîtrise de la programmation Python appliquée à la robotique. J'ai notamment approfondi l'usage des fonctions move_pose et move_linear_pose, en assimilant précisément leurs différences mécaniques et leurs cas d'application respectifs.<p> <br>J'ai pris l'initiative de m'investir pleinement dans la programmation du robot Niryo en écrivant les scripts nécessaires à l'exécution de ses trajectoires. En parallèle, j'ai collaboré activement avec le reste du groupe pour définir, tester et ajuster minutieusement les coordonnées et les positions du robot requises par notre application." },
            { id: "SP1.02", name: "Conseil à un client dans le but de lui permettre d'améliorer sa productivité et de la faire évoluer vers une industrie 4.0 ou 5.0.", desc: "Dans le cadre de la SAE 22 - Conception et déploiement d'une solution de robotique, ce projet consistait à conseiller un client pour moderniser sa production et booster sa productivité vers l'industrie 4.0 et 5.0. <p><br>La solution choisie repose sur l'intégration d'un robot collaboratif UR10 qui automatise le chargement des cartons en toute sécurité, directement aux côtés des opérateurs et sans aucune cage de protection. <p><br>Pour garantir une production en continu, le système gère deux palettes en parallèle, permettant à l'opérateur de remplacer une palette pleine sans jamais devoir stopper le robot. En amont, un lecteur de code-barres placé sur le convoyeur scanne chaque carton en temps réel pour assurer une traçabilité totale et éliminer les erreurs de tri. <p><br>Enfin, la manipulation est fluidifiée par un préhenseur à ventouses parfaitement adapté aux colis, tandis qu'une verrine lumineuse indique l'état des palettes (vide, en cours, pleine) afin d'optimiser le travail de l'opérateur. Cette approche simple et efficace combine performance industrielle et amélioration des conditions de travail." },

            /* --- APPRENTISSAGES CRITIQUES --- */
            { typeTitle: "💡 Apprentissages Critiques", id: "AC11.01", name: "Analyser les schémas techniques (P&ID, plans mécaniques, schémas électriques) correspondant à l'installation existante d'un client ou à un projet en cours.", desc: "Dans le cadre de ma formation, j'ai appris à analyser les schémas techniques d'installations existantes ou de projets en cours à travers trois axes principaux.<p><br> Tout d'abord, le module R1.17 - Régulation et asservissements m'a permis de maîtriser l'analyse des schémas P&ID. Grâce à ce cours, je suis capable de repérer les différents symboles industriels, d'implanter des boucles de régulation et de réaliser une décomposition fonctionnelle en modules et en unités.<p><br> Ensuite, l'étude des schémas structurels abordée dans le module R1.22 - Bases de la mécanique pour la robotique m'a formé à la lecture de plans mécaniques. J'y ai appris à étudier les matériaux et leur rugosité, ainsi qu'à appliquer les notions de mécanique de base telles que les vecteurs, la cinématique, les liaisons et les actions mécaniques.<p><br> Enfin, à travers le module R1.19 - Automatismes : Logique combinatoire et séquentielle, j'ai développé mes compétences dans la lecture de schémas électriques. Je sais désormais décoder les différents symboles, identifier l'appareillage électrique et analyser les départs moteurs.<p><br> L'ensemble de ces connaissances me permet de comprendre globalement une installation industrielle afin de conseiller efficacement un client pour améliorer sa productivité et l'accompagner vers l'industrie 4.0 ou 5.0." },
            { id: "AC11.02", name: "Choisir les capteurs et les actionneurs adaptés aux besoins du client, aux normes correspondant à son secteur d'activité, et à son procédé.", desc: "Dans le cadre de ma formation, j'ai développé une solide expertise dans le choix et la configuration des composants d'acquisition et de puissance adaptés aux besoins d'un procédé industriel.<p><br> Tout d'abord, le module R2.15 - Instrumentation et Détecteurs TOR m'a permis de maîtriser les fondamentaux de l'instrumentation industrielle. Grâce à ce cours, je suis capable de sélectionner et de mettre en œuvre des capteurs de grandeurs physiques (pression, niveau, température) utilisant des boucles de courant standardisées 4-20 mA.<p><br> De plus, l'étude approfondie de ces technologies m'a formé à l'utilisation des capteurs de proximité industriels. J'ai ainsi appris à différencier, câbler et configurer des détecteurs inductifs, capacitifs (faisant intervenir des composants passifs) ou optiques à polarisation, selon la nature des objets à détecter.<p><br> Enfin, à travers le module R2.06 - Puissance et schémas de liaison à la terre, j'ai acquis les compétences nécessaires à l'analyse de la puissance électrique requise pour les actionneurs. Je sais désormais étudier et dimensionner des réseaux électriques monophasés et triphasés, tout en calculant les rendements énergétiques des machines.<p><br> Cet ensemble de compétences techniques me permet de concevoir une chaîne d'action et d'acquisition parfaitement calibrée, robuste et conforme aux exigences spécifiques de chaque client.." },
            { id: "AC11.03", name: "Programmer les automates programmables, les robots permettant de répondre au cahier des charges du projet d'automatisme industriel.", desc: "Dans le cadre de ma formation, j'ai acquis de solides compétences en développement pour l'automatisme industriel, me permettant de programmer des automates et des bras robotiques afin de répondre précisément aux exigences d'un cahier des charges.<p><br> Tout d'abord, le module R1.19 - Automatismes : Logique combinatoire et séquentielle m'a permis de maîtriser les standards de l'architecture industrielle à travers les langages de la norme IEC 61131-3. Grâce à ce cours, je suis capable de développer des programmes structurés, en Grafcet (SFC), en schéma à contacts (LD) ou en blocs fonctionnels (FBD), tout en appliquant rigoureusement les règles de la logique combinatoire et séquentielle.<p><br> Ensuite, l'apprentissage du langage Python abordé dans le module R2.07 - Programmation Orientée Objet m'a formé au développement de scripts avancés. Cette compétence me permet d'interfacer des systèmes informatiques, de traiter des données de production complexes et de concevoir des applications connectées prêtes pour l'industrie 4.0.<p><br> Enfin, à travers le module R1.21 - Robotique Introduction, je me suis spécialisé dans l'écriture de scripts robotiques dédiés aux robots industriels. Je sais désormais programmer des trajectoires et des conditions logiques en utilisant des environnements et langages constructeurs de référence, tels que PolyScope (pour Universal Robots) ainsi que les langages de programmation spécifiques aux robots Fanuc.<p><br> Cet ensemble de compétences en codage et en logique industrielle me donne toutes les clés pour configurer et programmer une ligne de production." },
            { id: "AC11.04", name: "Utiliser la vision industrielle et l'intelligence artificielle dans le but d'améliorer la production.", desc: "Écriture des programmes d'automatisation répondant précisément au cahier des charges de l'îlot industriel." },
            { id: "AC11.05", name: "planifier les mouvements et les trajectoires d'un robot.", desc: "Dans le cadre de ma formation, j’ai développé des compétences clés en robotique industrielle me permettant de définir, programmer et optimiser les déplacements d'un bras articulé en fonction des contraintes de son environnement.<p><br> Tout d'abord, les modules R1.21 et R1.07 m'ont permis de maîtriser la gestion des différents référentiels de travail. Grâce à ces cours, je suis capable de configurer et de basculer entre le repère Monde, le repère Outil et le repère Travail afin de garantir des déplacements précis.<p><br> De plus, l'étude des espaces de travail également abordée dans ces modules m'a formé à appréhender la géométrie du robot. Je sais faire la distinction entre l'espace Cartésien (positionnement de l'outil dans l'espace en X, Y, Z) et l'espace articulaire (coordonnées propres à chaque axe et moteur du robot), ce qui est essentiel pour éviter les singularités mathématiques et les collisions.<p><br> Enfin, ces enseignements m'ont appris à sélectionner et programmer les types de mouvements les plus adaptés à l'application métier. Qu'il s'agisse de trajectoires articulaires ou de trajectoires linéaires, je sais optimiser le cycle du robot.<p><br>Cet ensemble de connaissances théoriques et pratiques me permet de planifier des trajectoires fluides, d’optimiser les temps de cycle et de garantir la sécurité des équipements au sein d'un système automatisé." }
        ];

        const structureUE2 = [
            /* --- COMPOSANTES ESSENTIELLES --- */
            { typeTitle: "⚙️ Composantes Essentielles", id: "CE2.01", name: "En se protégeant des risques liés au milieu industriel.", desc: "Au cours de ma formation, j'ai vite compris que bosser sur des machines industrielles demandait une vigilance de tous les instants. Pour moi, la sécurité n'est pas juste une option, et j'ai appris à travailler en faisant toujours attention à me protéger des risques liés au milieu industriel. Ça touche aussi bien la sécurité physique sur le terrain que la partie électrique ou même informatique.<p><br>  Concrètement, pendant les TP et surtout durant la SAÉ 2.3 - Mise en place de mesures de réduction des risques en lien avec la dangerosité du procédé de fabrication, mon premier réflexe a toujours été de mettre mes EPI : le casque, les gants, la blouse et le tapis isolant dès que je touchais à une armoire, tout en respectant scrupuleusement les consignes de sécurité autour des machines.<p><br>  Côté technique, le module R2.06 - Puissance et schéma de liaison à la terre m'a permis de comprendre comment sécuriser une installation électrique. Grâce aux notions de ce module R2.06 - Puissance et schéma de liaison à la terre, je sais analyser les régimes de neutre comme le TT, le TN ou l'IT pour éviter qu'une personne ne prenne un coup de jus en cas de défaut d'isolement, tout en gardant les machines opérationnelles.<p><br> Enfin, on ne peut pas parler de sécurité industrielle aujourd'hui sans parler de réseau, puisque tout est connecté. Dans le module R1.09 - Initiation aux réseaux, j’ai découvert l'importance de la cybersécurité pour éviter qu'une attaque informatique ne vienne bloquer toute une ligne de production. J'ai pu mettre cela en pratique dans le module R2.09 - Bases des services réseaux, où on a travaillé sur les VLANs. Le fait de segmenter le réseau de cette manière permet d'isoler et de sécuriser les flux de communication sensibles de l'usine pour que le procédé de fabrication reste protégé." },
            { id: "CE2.02", name: "En respectant les procédures QHSSE de l'entreprise.", desc: "Tout au long de mon parcours, j'ai vite compris que dans l'industrie, on ne fait pas ce qu'on veut : le respect des normes, des réglementations et plus particulièrement des procédures QHSSE, c'est le fil conducteur de tout notre boulot.<p><br> Dès nos premiers cours théoriques et nos TP en automatisme, on nous a bien fait comprendre que ces standards étaient indispensables. En bossant en salle de TP sur des maquettes pédagogiques inspirées de vraies lignes de production et de vraies machines, j'ai été directement confrontée aux exigences industrielles. C'est là que j'ai pris l'habitude de suivre un cahier des charges à la lettre, surtout quand ça touche à la sécurité des installations. Pour manipuler le matériel en atelier, j'ai d'ailleurs dû signer des chartes de bonne conduite sur l'utilisation des robots. Ça m'a vraiment fait prendre conscience des responsabilités et des règles strictes à respecter avant même de charger un programme ou de toucher à une machine.<p><br> Aujourd'hui, quand je démarre une SAÉ, mon premier réflexe est de me plonger dans le cahier des charges pour repérer toutes les contraintes réglementaires à respecter. Au fil des projets, c'est devenu une habitude : je sais interpréter les directives pour être sûre que ce que je conçois en salle de cours ou en TP soit parfaitement conforme aux critères QHSSE. Concrètement, ça veut dire que je fais attention à choisir des composants certifiés, à utiliser les technologies validées par le secteur et à concevoir mes programmes et mes schémas de manière standardisée, pour que n'importe quel autre étudiant ou technicien puisse s'y retrouver." },
            { id: "CE2.03", name: "En communication en français et en anglais avec les différents acteurs impliqués.", desc: "Au cours de ma formation, pendant mes projets d’automatisme ou de robotique, j’ai vite réalisé que la technique ne faisait pas tout : pour que ça marche, il faut surtout savoir bien bosser en équipe. C'est là que les modules R1.01 et R2.01 - Anglais et communication m'ont beaucoup aidée. Ils m'ont appris à échanger plus facilement, que ce soit en français ou en anglais, avec toutes les personnes impliquées dans nos projets de groupe ou lors de nos présentations.<p><br> L'anglais m'a vraiment poussée à sortir de ma zone de confort. Entre les notices techniques de robots ou d'automates qui sont presque toujours en anglais, et les petits oraux qu'il fallait préparer pour les cours. Mais ça m'a permis de capter pas mal de vocabulaire technique et d'apprendre à transmettre les informations essentielles pour le boulot.<p><br> Mon niveau en anglais reste pour l'instant limité et constitue l'un de mes points faibles. J'ai parfois du mal à m'exprimer de manière fluide à l'oral et à comprendre des discussion complexe. C'est vraiment quelque chose que je veux améliorer. Je compte continuer à m'entraîner à parler dès que j'en ai l'occasion et continuer à lire des docs en anglais pour me familiariser avec la langue et gagner en confiance." },
            
            /* --- SITUATIONS PROFESSIONNELLES --- */
            { typeTitle: "💼 Situations Professionnelles", id: "SP2.01", name: "Mise en service d'une solution d'automatisme ou de robotique.", desc: "Pour la partie automatisme, c'est dans le cadre de la SAÉ 2.1 - Conception et déploiement d'une solution d'automatisme qu'on a dû concevoir en groupe un système de mesure filaire pour suivre le niveau d'une cuve de DEHT. L'objectif était de mesurer le liquide en continu, de calculer automatiquement le volume en m³ et la masse en tonnes, puis de transmettre toutes ces données à distance, via le réseau interne, vers les ordinateurs des bureaux administratifs et de production. Pour que notre solution fonctionne, on a choisi d'utiliser un capteur radar VEGAPULS 21. Ce choix était parfait car il s'agit d'un capteur capable de prendre la mesure à travers le plastique de la cuve, ce qui nous a permis de remonter des informations super fiables sans jamais devoir ouvrir le réservoir.<p><br>Côté robotique, c'est dans la SAÉ 2.2 qu'on a pu aller le plus loin. On s'est mis dans la peau de consultants pour conseiller un client qui voulait moderniser sa production et passer à l'industrie 4.0 et 5.0.<p><br> On a proposé et mis en place une solution basée sur un cobot UR10. L'avantage de ce robot collaboratif, c'est qu'il automatise le chargement des cartons en toute sécurité directement à côté des opérateurs, sans avoir besoin d'installer de grosses cages de protection fermées. Pour éviter que le système ne s'arrête jamais, on a configuré la gestion de deux palettes en parallèle : pendant que le robot remplit une palette, l'opérateur peut retirer la palette pleine d'à côté en toute sécurité, sans couper la production. En plus, on a intégré un lecteur de code-barres sur le convoyeur pour scanner chaque carton à la volée, ce qui assure une traçabilité totale et évite les erreurs de tri. Pour la manipulation, on a équipé le robot d'un préhenseur à ventouses adapté aux cartons, et on a installé une verrine lumineuse pour que l'opérateur sache en un coup d'œil où en est le remplissage (palette vide, en cours ou pleine).<p><br> Ces deux projets m'ont vraiment montré comment une bonne mise en service d'automatisme ou de robotique permet de booster l'efficacité d'une entreprise tout en facilitant la vie des personnes sur place." },
            { id: "SP2.02", name: "Mise en service d'une supervision ou d'un système de contrôle commande.", desc: "Raccordement des flux de données vers le SCADA et validation des animations graphiques de l'IHM." },
            { id: "SP2.03", name: "Mise en place et paramétrage d'une infrastructure réseau.", desc: "Dans le module R2.09 - Bases des services réseaux, on ne s'est pas juste arrêtés à la théorie : on a dû monter et configurer une infrastructure complète de A à Z. Concrètement, on a construit l'architecture réseau en paramétrant un routeur pour gérer les communications, et on a mis en place des VLANs. Le but était d'apprendre à segmenter correctement le réseau pour que les différents équipements d'une usine communiquent de façon fluide, mais surtout de manière totalement sécurisée en isolant les flux sensibles. C'est un exercice qui m'a permis de comprendre comment on interconnecte proprement les machines et les systèmes de contrôle-commande dans un environnement industriel réel." },

            /* --- APPRENTISSAGES CRITIQUES --- */
            { typeTitle: "💡 Apprentissages Critiques", id: "AC12.01", name: "Valider le fonctionnement d'une solution d'automatisme ou de robotique en atelier (FAT).", desc: "Dans le cadre de ma formation, j'ai appris à observer et à ajuster le fonctionnement des machines lors des séances de travaux pratiques.<p><br> Tout d'abord, les modules R1.21 et R2.21 m'ont permis d'apprendre à mesurer et analyser les temps de cycle de production d'un système. En observant les maquettes, je sais vérifier visuellement la bonne synchronisation entre les capteurs et les actionneurs pour m'assurer que le robot ou l'automate enchaîne ses mouvements sans bloquer.<p><br> De plus, ces manipulations m'ont sensibilisé à l'importance de suivre le rythme des tempos programmés et de repérer les discordances (les bugs ou les décalages) entre ce que le programme doit faire et ce que la machine fait réellement.." },
            { id: "AC12.02", name: "Configurer les entrées et sorties d'une solution d'automatisme ou de robotique.", desc: "En complément du raccordement physique, j'ai également appris à configurer les entrées et sorties d'une solution d'automatisme ou de robotique au sein des logiciels de programmation.<p><br> Dans le cadre des modules liés aux Lois Circuits & Technologies ES, j'ai découvert comment déclarer et paramétrer les différents points d'E/S (Entrées/Sorties) dans l'environnement de développement de l'automate. Je sais désormais affecter des adresses mémoires aux capteurs et actionneurs câblés, et définir les types de signaux appropriés (numériques ou analogiques) pour assurer la bonne communication entre le matériel et la logique de commande.." },
            { id: "AC12.03", name: "Raccorder les entrées et sorties d'une solution d'automatisme ou de robotique et vérifier le bon fonctionnement des chaînes d'information ou d'action. (synchronisations)", desc: "Dans le cadre de ma formation, j’ai développé des compétences pratiques pour préparer physiquement une cellule automatisée ou robotique avant sa mise en marche.<p><br> Tout d'abord, la SAÉ 1.02 - Apprendre à câbler les capteurs et actionneurs m'a permis d'apprendre à raccorder les entrées et sorties d'une solution d'automatisme ou de robotique. En travaux pratiques (TP), je suis à l'aise pour câbler proprement les capteurs et les actionneurs sur les cartes d'entrées/sorties de l'automate en suivant un schéma électrique.<p><br> De plus, je sais vérifier le bon fonctionnement des chaînes d'information ou d'action (synchros). Cela signifie que je réalise des tests pratiques (comme des forçages de variables) pour m'assurer visuellement que l'acquisition des données des capteurs et le pilotage des actionneurs se font de manière synchronisée et cohérente sur la maquette." },
            { id: "AC12.04", name: "Analyse de l'architecture réseau d'un client dans le but d'intégrer un composant d'automatisme ou de robotique.", desc: "Dans le cadre de ma formation, j'ai acquis des compétences fondamentales en réseaux informatiques, me permettant de comprendre l’architecture existante d'une installation afin d'y intégrer un nouveau composant d'automatisme ou de robotique.<p><br> Tout d'abord, le module R1.09 - Initiation aux réseaux m'a apporté une introduction essentielle à travers l'étude de la structure des réseaux et du modèle OSI. Grâce à ces notions, je comprends comment s'organisent et circulent les flux de données entre les différents équipements industriels.<p><br> Ensuite, l'apprentissage des bases des services réseaux abordé dans le module R2.09 m'a familiarisé avec les protocoles indispensables à la connectivité. Je connais désormais le rôle de services clés tels que le DHCP (pour la configuration automatique des adresses IP), le DNS (pour la résolution de noms) et l'HTTP (utilisé notamment pour l'accès aux pages de configuration ou de supervision web des appareils).<p><br> Cet ensemble de connaissances me permet de prendre en compte les contraintes informatiques d'un système pour interconnecter efficacement les automates et les robots.." },
            { id: "AC12.05", name: "Valider le fonctionnement d'une solution d'automatisme / de robotique sur site (SAT).", desc: "Dans le cadre de ma formation, j'ai appris à mener les étapes de contrôle indispensables lors de la réalisation de tests.<p><br> Tout d'abord, le module R2.18 - Commande en boucle fermée des procédés m'a permis de me concentrer sur la validation pratique des systèmes. Grâce aux travaux pratiques (TP), j'ai appris à observer le comportement de l'automate afin d'analyser, par des essais successifs, s'il réagit correctement aux commandes de base.<p><br> De plus, ces manipulations concrètes me permettent de contrôler visuellement et techniquement le bon fonctionnement du matériel. Je sais ainsi m'assurer que les capteurs envoient la bonne information à l'automate et que les actionneurs s'activent au moment voulu, ce qui m'aide à détecter les erreurs de câblage ou de logique directement sur la maquette.<p><br> Si je suis à l'aise avec la vérification visuelle et le câblage du matériel en TP, anticiper et réussir à coup sûr le test de comportement global reste un défi pour moi. De même, l'analyse fonctionnelle théorique ainsi que le réglage précis et le respect des boucles fonctionnelles (asservissements complexes) constituent mes principaux points faibles. Ce sont des notions abstraites et changeantes que je dois encore approfondir et pratiquer pour gagner en assurance en amont des projets." }
        ];

            { typeTitle: "💡 Apprentissages Critiques", id: "AC13.01", name: "Effectuer la vérification métrologique d'un instrument de mesure.", desc: "Étalonnage et calibration de capteurs industriels par rapport à des grandeurs étalons." },
            { id: "AC13.02", name: "Déterminer la durée de vie d'un actionneur, ou d'une pièce d'usure de celui-ci dans le but de planifier des opérations de maintenance systématique.", desc: "Calculs de fiabilité (MTBF) et analyse statistique d'usure pour caler la périodicité optimale des arrêts." },
            { id: "AC13.04", name: "Gérer les documents de suivi des instruments (fiches de vie, GMAO).", desc: "Administration des bases de données de maintenance et historisation des cycles de vie matériels." }
        ];

        const structureUE4 = [
            /* --- COMPOSANTES ESSENTIELLES --- */
            { typeTitle: "⚙️ Composantes Essentielles", id: "CE4.01", name: "En mesurant et analysant les risques,", desc: "Établissement du document unique d'évaluation des risques physiques et logiques sur l'îlot." },
            { id: "CE4.02", name: "En respectant les normes et le cadre juridique", desc: "Application de la directive machine (ISO 13849) et du RGPD / Lois sur la sécurité numérique." },
            { id: "CE4.03", name: "En intégrant les dernières technologies", desc: "Déploiement de pare-feux industriels de nouvelle génération, de barrières immatérielles programmables." },
            { id: "CE4.04", name: "En sensibilisant efficacement les acteurs concernés", desc: "Animation de quarts d'heure sécurité sur les risques électriques et de sessions de prévention au phishing." },
            
            /* --- SITUATIONS PROFESSIONNELLES --- */
            { typeTitle: "💼 Situations Professionnelles", id: "SP4.01", name: "Mise en place de mesures de réduction des risques en lien avec la dangerosité du procédé de fabrication.", desc: "Implantation d'EPI, d'arrêts d'urgence et de cartérisations physiques sur les zones mobiles robotisées." },
            { id: "SP4.02", name: "Assurer la cybersécurité de l'installation de production.", desc: "Durcissement des configurations d'automates, blocage des ports USB non utilisés et gestion des ACL." },
            { id: "SP4.03", name: "Analyse de l'existant et étude des besoins de sécurité.", desc: "Cartographie complète des flux de données et des accès physiques pour identifier les failles potentielles." },
            { id: "SP4.04", name: "Évolution et mise en conformité de l'installation d'une entreprise.", desc: "Refonte d'une boucle de sécurité obsolète pour validation finale d'un organisme agréé." },

            /* --- APPRENTISSAGES CRITIQUES --- */
            { typeTitle: "💡 Apprentissages Critiques", id: "AC14.01", name: "Identifier les risques liés au procédé de fabrication.", desc: "Analyse AMDEC produit/procédé pour identifier les modes de défaillance et leurs effets." },
            { id: "AC14.02", name: "Se protéger des risques électriques.", desc: "Dans le cadre de ma formation et de mes activités pratiques en atelier, la sécurité individuelle et collective a toujours été ma priorité absolue, notamment lors des interventions sur les armoires industrielles.<p><br> C'est particulièrement lors de la SAÉ 2.3 - Mise en place de mesures de réduction des risques en lien avec la dangerosité du procédé de fabrication que j'ai consolidé ces compétences et que j'ai été habilitée en tant qu'exécutante électricienne (B1 et B1V). Dans ce cadre, j'ai appris à appliquer rigoureusement les procédures pour se protéger des risques électriques. Lors de la réalisation de mesures sous tension, je veille au respect strict des règles de l'habilitation électrique : je sais appliquer les consignes de sécurité transmises par le chargé de travaux, mettre en œuvre les équipements de protection individuelle (EPI) obligatoires — tels que les gants isolants et l'écran facial anti-flash — et utiliser correctement le VAT (Vérificateur d'Absence de Tension) pour travailler en toute sécurité dans la zone de voisinage." },
            { id: "AC14.03", name: "Connaître les principaux types d'attaque informatique", desc: "Dans le cadre de ma formation, j'ai été sensibilisée aux enjeux de la sécurité informatique, une compétence devenue essentielle pour protéger les réseaux industriels connectés.<p><br> À travers le module R1.09 - Initiation aux réseaux, j'ai appris à connaître les principaux types d'attaques informatiques qui peuvent cibler une entreprise (comme le phishing, les attaques par déni de service ou les ransomwares). J'ai ainsi été formée à identifier les failles des systèmes (qu'elles soient logicielles ou humaines) qui rendent les installations vulnérables. De plus, j'ai découvert les notions de remédiations associées, c'est-à-dire les bonnes pratiques et les solutions techniques (comme la mise en place de mots de passe forts, le chiffrement ou la mise à jour des systèmes) à mettre en place pour corriger ces failles et sécuriser les accès.<p><br> Bien que je comprenne les concepts généraux de menaces et de protection, l'application concrète des protocoles de sécurité avancés reste l'un de mes points faibles. C'est un domaine très vaste et abstrait que je dois encore approfondir pour être capable de sécuriser une architecture réseau de bout en bout de manière totalement autonome.." },
            { id: "AC14.04", name: "Connaître et utiliser les bonnes pratiques et les recommandations de cybersécurité", desc: "En lien direct avec l'étude des menaces réseau, j'ai appris à connaître et utiliser les bonnes pratiques et les recommandations de cybersécurité.<p><br> Toujours dans le cadre du module R1.09 - Initiation aux réseaux, j'ai été initiée aux principes fondamentaux de l'hygiène informatique indispensables en entreprise. J'ai notamment étudié les recommandations de l'ANSSI (Agence nationale de la sécurité des systèmes d'information) pour savoir comment sécuriser un poste de travail et adopter les bons réflexes au quotidien, comme la gestion rigoureuse des identifiants ou la méfiance face aux périphériques externes inconnus.<p><br>Si je maîtrise les règles de base de l'hygiène informatique à l'échelle individuelle, savoir appliquer l'ensemble des recommandations de l'ANSSI sur un parc de machines industrielles complet reste un point faible. Déployer ces politiques de sécurité à grande échelle est une compétence technique que je dois encore travailler et approfondir." }
        ];

        const dataUEs = {
            ue1: { title: "🚀 UE 1 - Concevoir des systèmes industriels", short: "UE 1 - Concevoir", icon: "🚀", categories: structureUE1 },
            ue2: { title: "⚙️ UE 2 - Déployer des systèmes industriels", short: "UE 2 - Déployer", icon: "⚙️", categories: structureUE2 },
            ue3: { title: "🛠️ UE 3 - Maintenir et gérer des systèmes industriels", short: "UE 3 - Maintenir", icon: "🛠️", categories: structureUE3 },
            ue4: { title: "🛡️ UE 4 - Sécuriser des systèmes industriels", short: "UE 4 - Sécuriser", icon: "🛡️", categories: structureUE4 }
        };

        let activeUE = 'ue1';

        window.onload = function() {
            renderGrid();
        };

        function renderGrid() {
            const container = document.getElementById('ue-grid-container');
            container.innerHTML = '';
            
            for (let ueKey in dataUEs) {
                const ueData = dataUEs[ueKey];
                const box = document.createElement('div');
                box.className = 'ue-box-accueil';
                box.setAttribute('onclick', `ouvrirDashboard('${ueKey}')`);
                
                box.innerHTML = `
                    <span class="icon">${ueData.icon}</span>
                    <h3>${ueData.short.split(' - ')[0]}</h3>
                    <p>${ueData.short.split(' - ')[1]}</p>
                `;
                container.appendChild(box);
            }
        }

        function ouvrirDashboard(id) {
            const accueil = document.getElementById('page-accueil');
            const dashboard = document.getElementById('page-dashboard');
            accueil.className = "fade-out-global";
            
            setTimeout(() => {
                accueil.style.display = 'none';
                dashboard.style.display = 'flex';
                dashboard.className = "fade-in-global";
                
                chargerDonneesUe(id);
            }, 400);
        }

        function retourAccueil() {
            const accueil = document.getElementById('page-accueil');
            const dashboard = document.getElementById('page-dashboard');
            dashboard.className = "fade-out-global";
            
            setTimeout(() => {
                dashboard.style.display = 'none';
                accueil.style.display = 'flex';
                accueil.className = "fade-in-global";
                renderGrid();
            }, 400);
        }

        function changerUeSidebar(id) {
            if (id === activeUE) return;
            chargerDonneesUe(id);
        }

        function chargerDonneesUe(id) {
            activeUE = id;
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('menu-' + id).classList.add('active');

            const info = dataUEs[id];
            const parts = info.title.split(' - ');
            document.getElementById('dynamic-ue-title').innerHTML = parts[0];
            document.getElementById('dynamic-ue-subtitle').innerHTML = parts[1];

            const container = document.getElementById('dynamic-accordion-container');
            container.innerHTML = ''; 

            info.categories.forEach(cat => {
                if (cat.typeTitle) {
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'section-category-title';
                    titleDiv.innerHTML = cat.typeTitle;
                    container.appendChild(titleDiv);
                }

                const detailsElement = document.createElement('details');
                detailsElement.className = 'horizontal-case';
                
                detailsElement.innerHTML = `
                    <summary>
                        <div class="case-header-title">
                            <span class="case-number">${cat.id}</span>
                            <span>${cat.name}</span>
                        </div>
                        <span class="arrow">▼</span>
                    </summary>
                    <div class="case-content">
                        <div class="inner-text-block">
                            <p>${cat.desc}</p>
                        </div>
                    </div>
                `;
                container.appendChild(detailsElement);
            });
        }
    </script>
